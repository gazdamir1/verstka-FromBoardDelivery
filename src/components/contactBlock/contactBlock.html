<div class="contactBlockMain">

    <div class="contactInline container">

        <div class="contactBlock">

            <div class="contactText">
                <p class="headerText">Остались вопросы?</p>
            </div>

            <form class="contactForm">

                <div class="form-group">
                    <input class="contactFormInput" placeholder="Имя" id="contactName">
                    <div class="error-message" id="contactNameError"></div>
                </div>

                <div class="form-group">
                    <input class="contactFormInput" placeholder="Почта" type="email" id="contactEmail">
                    <div class="error-message" id="contactEmailError"></div>
                </div>

                <div class="form-group">
                    <input class="contactFormInput" placeholder="Телефон" type="tel" id="contactPhone">
                    <div class="error-message" id="contactPhoneError"></div>
                </div>

                <div class="form-group">
                    <input class="contactFormInput" placeholder="Тема вопроса" id="contactQuestion">
                    <div class="error-message" id="contactQuestionError"></div>
                </div>

                <div class="form-group2">
                    <textarea class="ContactFormTextArea" placeholder="Сообщение..." data-validate-field="message" id="contactMessage"></textarea>
                    <div class="error-message-TextArea" id="contactMessageError"></div>
                </div>


                <button type="button" class="contactFormButton" id="contactSubmitBtn">Оставить заявку</button>
            </form>
        </div>
    </div>
</div>
